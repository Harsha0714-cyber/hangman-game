<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 Hangman Game</h1>
        
        <div class="game-container">
            <!-- Hangman Drawing -->
            <div class="hangman">
                <svg viewBox="0 0 200 250" width="200" height="250">
                    <!-- Gallows -->
                    <line x1="10" y1="230" x2="150" y2="230" stroke="black" stroke-width="4"/>
                    <line x1="50" y1="230" x2="50" y2="20" stroke="black" stroke-width="4"/>
                    <line x1="50" y1="20" x2="130" y2="20" stroke="black" stroke-width="4"/>
                    <line x1="130" y1="20" x2="130" y2="50" stroke="black" stroke-width="4"/>
                    
                    <!-- Head -->
                    <circle id="head" cx="130" cy="70" r="20" stroke="black" stroke-width="4" fill="none" style="display:none"/>
                    
                    <!-- Body -->
                    <line id="body" x1="130" y1="90" x2="130" y2="150" stroke="black" stroke-width="4" style="display:none"/>
                    
                    <!-- Left Arm -->
                    <line id="leftArm" x1="130" y1="110" x2="100" y2="130" stroke="black" stroke-width="4" style="display:none"/>
                    
                    <!-- Right Arm -->
                    <line id="rightArm" x1="130" y1="110" x2="160" y2="130" stroke="black" stroke-width="4" style="display:none"/>
                    
                    <!-- Left Leg -->
                    <line id="leftLeg" x1="130" y1="150" x2="110" y2="180" stroke="black" stroke-width="4" style="display:none"/>
                    
                    <!-- Right Leg -->
                    <line id="rightLeg" x1="130" y1="150" x2="150" y2="180" stroke="black" stroke-width="4" style="display:none"/>
                </svg>
            </div>
            
            <!-- Game Info -->
            <div class="game-info">
                <div class="word-display" id="wordDisplay">_ _ _ _ _ _</div>
                <div class="stats">
                    <p>Wrong Attempts: <span id="wrongCount">0</span>/6</p>
                    <p>Wrong Letters: <span id="wrongLetters"></span></p>
                </div>
            </div>
        </div>
        
        <!-- Keyboard -->
        <div class="keyboard" id="keyboard"></div>
        
        <!-- Messages -->
        <div id="message" class="message"></div>
        
        <!-- Buttons -->
        <div class="buttons">
            <button onclick="newGame()" class="btn btn-primary">New Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
